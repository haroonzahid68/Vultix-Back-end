<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vultix AI | Authentication</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root { --bg: #050508; --accent: #6366f1; --cyan: #22d3ee; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: #f8fafc; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(circle at 50% 0%, #1e1b4b, transparent); }
        .glass-panel { background: rgba(15, 15, 25, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .input-field { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .input-field:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        .form-container { transition: all 0.5s ease-in-out; }
        .hidden-form { opacity: 0; pointer-events: none; position: absolute; transform: scale(0.95); }
        .active-form { opacity: 1; pointer-events: auto; position: relative; transform: scale(1); }
        
        /* Red Border class for error */
        .error-border { border-color: #ef4444 !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.3) !important; }
    </style>
</head>
<body>

    <div id="g_id_onload" data-client_id="1040604821889-nlp7drjmimem7p2ldh1bkhkepp9f1hii.apps.googleusercontent.com" data-context="signin" data-ux_mode="popup" data-callback="handleGoogleResponse" data-auto_prompt="false"></div>

    <div class="glass-panel w-full max-w-md p-10 rounded-3xl relative overflow-hidden">
        
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black italic text-indigo-500 tracking-tighter">VULTIX AI</h1>
            <p class="text-[10px] text-slate-400 uppercase tracking-[4px] mt-2">Agency Dashboard</p>
        </div>

        <div id="login-form" class="form-container active-form">
            <h2 class="text-xl font-bold mb-6 text-center">Welcome Back!</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-slate-400 font-bold uppercase ml-1">Username</label>
                    <div class="relative mt-1">
                        <i data-lucide="user" class="absolute left-3 top-3.5 w-4 h-4 text-slate-500"></i>
                        <input type="text" id="login-username" class="input-field w-full rounded-xl py-3 pl-10 pr-4 text-sm outline-none text-white" placeholder="Enter your username">
                    </div>
                </div>
                <div>
                    <label class="text-xs text-slate-400 font-bold uppercase ml-1">Password</label>
                    <div class="relative mt-1">
                        <i data-lucide="lock" class="absolute left-3 top-3.5 w-4 h-4 text-slate-500"></i>
                        <input type="password" id="login-password" class="input-field w-full rounded-xl py-3 pl-10 pr-4 text-sm outline-none text-white" placeholder="••••••••">
                    </div>
                </div>
                <button onclick="manualAuth('login')" class="btn-primary w-full text-white font-bold py-3 rounded-xl mt-4 flex justify-center items-center gap-2">
                    <i data-lucide="log-in" class="w-4 h-4"></i> Sign In
                </button>
            </div>
            <div class="flex items-center my-6"><div class="flex-1 border-t border-white/10"></div><span class="px-4 text-xs text-slate-500 font-bold">OR</span><div class="flex-1 border-t border-white/10"></div></div>
            <div class="flex justify-center"><div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="filled_black" data-text="signin_with" data-size="large" data-logo_alignment="left"></div></div>
            <p class="text-xs text-center text-slate-400 mt-8">Don't have an account? <span onclick="toggleForm('signup')" class="text-indigo-400 cursor-pointer hover:underline font-bold">Sign Up</span></p>
        </div>

        <div id="signup-form" class="form-container hidden-form">
            <h2 class="text-xl font-bold mb-6 text-center">Create Identity</h2>
            <div class="space-y-4">
                
                <div>
                    <label class="text-xs text-slate-400 font-bold uppercase ml-1">Full Name</label>
                    <div class="relative mt-1">
                        <i data-lucide="badge-check" class="absolute left-3 top-3.5 w-4 h-4 text-slate-500"></i>
                        <input type="text" id="signup-fullname" class="input-field w-full rounded-xl py-3 pl-10 pr-4 text-sm outline-none text-white" placeholder="Enter your full name">
                    </div>
                </div>

                <div>
                    <label class="text-xs text-slate-400 font-bold uppercase ml-1">Unique Username</label>
                    <div class="relative mt-1">
                        <i data-lucide="user" class="absolute left-3 top-3.5 w-4 h-4 text-slate-500"></i>
                        <input type="text" id="signup-username" class="input-field w-full rounded-xl py-3 pl-10 pr-4 text-sm outline-none text-white" placeholder="e.g. haroon68">
                    </div>
                </div>
                
                <div>
                    <label class="text-xs text-slate-400 font-bold uppercase ml-1">Password</label>
                    <div class="relative mt-1">
                        <i data-lucide="lock" class="absolute left-3 top-3.5 w-4 h-4 text-slate-500"></i>
                        <input type="password" id="signup-password" class="input-field w-full rounded-xl py-3 pl-10 pr-4 text-sm outline-none text-white" placeholder="Create password (min 6 chars)">
                    </div>
                </div>

                <button onclick="manualAuth('signup')" class="btn-primary w-full text-white font-bold py-3 rounded-xl mt-4 flex justify-center items-center gap-2">
                    <i data-lucide="user-plus" class="w-4 h-4"></i> Create Account
                </button>
            </div>
            <div class="flex items-center my-6"><div class="flex-1 border-t border-white/10"></div><span class="px-4 text-xs text-slate-500 font-bold">OR</span><div class="flex-1 border-t border-white/10"></div></div>
            <div class="flex justify-center"><div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="filled_black" data-text="signup_with" data-size="large" data-logo_alignment="left"></div></div>
            <p class="text-xs text-center text-slate-400 mt-8">Already an agent? <span onclick="toggleForm('login')" class="text-indigo-400 cursor-pointer hover:underline font-bold">Sign In</span></p>
        </div>
        
        <div id="status-message" class="text-center text-xs font-bold mt-4 opacity-0 transition-opacity"></div>
    </div>

    <script>
        lucide.createIcons();

        function toggleForm(formType) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            
            // Remove red border error on toggle
            document.getElementById('signup-username').classList.remove('error-border');
            
            if (formType === 'signup') {
                loginForm.classList.remove('active-form'); loginForm.classList.add('hidden-form');
                signupForm.classList.remove('hidden-form'); signupForm.classList.add('active-form');
            } else {
                signupForm.classList.remove('active-form'); signupForm.classList.add('hidden-form');
                loginForm.classList.remove('hidden-form'); loginForm.classList.add('active-form');
            }
        }

        function showStatus(message, isError = true) {
            const statusDiv = document.getElementById('status-message');
            statusDiv.innerText = message;
            statusDiv.className = `text-center text-xs font-bold mt-4 transition-opacity opacity-100 ${isError ? 'text-red-400' : 'text-green-400'}`;
            setTimeout(() => { statusDiv.classList.remove('opacity-100'); statusDiv.classList.add('opacity-0'); }, 4000);
        }

        async function manualAuth(type) {
            const usernameInput = document.getElementById(`${type}-username`).value.trim();
            const passwordInput = document.getElementById(`${type}-password`).value;
            const nameInput = type === 'signup' ? document.getElementById(`signup-fullname`).value.trim() : "User";

            // Reset Error Borders
            document.getElementById('signup-username').classList.remove('error-border');

            if (!usernameInput || !passwordInput || (type === 'signup' && !nameInput)) {
                showStatus("Bhai, saari fields bharna lazmi hai! 💀"); return;
            }

            try {
                const response = await fetch(`https://vultix-back-end.onrender.com/${type}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name: nameInput, username: usernameInput, password: passwordInput })
                });

                const data = await response.json();

                if (response.ok) {
                    if (type === 'login') {
                        localStorage.setItem('user_id', data.user_id);
                        localStorage.setItem('username', data.username);
                        localStorage.setItem('full_name', data.full_name);
                        window.location.href = 'index.html';
                    } else {
                        showStatus("Account ban gaya! Ab login karo. 🎉", false);
                        toggleForm('login');
                    }
                } else {
                    // THE RED BORDER LOGIC FOR TAKEN USERNAME
                    if(data.detail === "USERNAME_TAKEN") {
                        document.getElementById('signup-username').classList.add('error-border');
                        showStatus("Bhai, ye username already use mein hai! Naya try karo.", true);
                    } else {
                        showStatus(data.detail || "Authentication failed!");
                    }
                }
            } catch (error) { showStatus("Server is sleeping! Backend check karo. 😴"); }
        }

        async function handleGoogleResponse(response) {
            try {
                const res = await fetch('https://vultix-back-end.onrender.com/google-auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: response.credential })
                });
                const data = await res.json();
                if (res.ok && data.user_id) {
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('full_name', data.full_name);
                    showStatus("Google Login Successful! Redirecting...", false);
                    setTimeout(() => { window.location.href = 'index.html'; }, 500);
                } else { showStatus("Google verification failed! ❌"); }
            } catch (error) { showStatus("Server not responding! 💀"); }
        }
    </script>
</body>
</html>
